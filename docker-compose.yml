services:
  postgres:
    image: postgres:18-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-speedy}
      POSTGRES_USER: ${POSTGRES_USER:-speedy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speedy -d speedy"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend

  landing:
    build: ./landing
    ports:
      - "3000:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
