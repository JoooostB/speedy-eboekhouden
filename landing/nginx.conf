resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    absolute_redirect off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Clean URLs for static pages
    location = /beveiliging {
        try_files /beveiliging.html =404;
    }

    location = /disclaimer {
        try_files /disclaimer.html =404;
    }

    # Proxy /app to the frontend container
    # ^~ ensures this takes priority over regex locations for static assets
    location ^~ /app/ {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /app to /app/
    location = /app {
        return 301 /app/;
    }

    # Proxy /api to the backend container
    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Landing page — serve static files with caching
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml text/xml;
    gzip_min_length 256;
}
