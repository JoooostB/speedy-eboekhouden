server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    absolute_redirect off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache HTML pages (short TTL, revalidate)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Clean URLs for static pages
    location = /beveiliging {
        try_files /beveiliging.html =404;
    }

    location = /disclaimer {
        try_files /disclaimer.html =404;
    }

    # Landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /app to the frontend container (^~ prevents regex locations from overriding)
    location ^~ /app/ {
        proxy_pass http://frontend:80/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /app to /app/
    location = /app {
        return 301 /app/;
    }

    # Proxy /api to the backend container
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript text/html image/svg+xml text/xml;
    gzip_min_length 256;
}
