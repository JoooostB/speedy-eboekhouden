name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -v -race

  frontend:
    name: Frontend type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [backend, frontend, landing]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t speedy-${{ matrix.image }} ./${{ matrix.image }}
