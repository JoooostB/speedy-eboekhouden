apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: FRONTEND_ORIGIN
            value: "https://speedy-eboekhouden.nl"
          - name: COOKIE_DOMAIN
            value: "speedy-eboekhouden.nl"
          - name: COOKIE_SECURE
            value: "true"
