apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: FRONTEND_ORIGIN
            value: "http://localhost"
          - name: COOKIE_SECURE
            value: "false"
  - target:
      kind: Ingress
      name: speedy-eboekhouden
    patch: |
      - op: remove
        path: /metadata/annotations
      - op: replace
        path: /spec/rules/0/host
        value: localhost
