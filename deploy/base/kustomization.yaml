apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: speedy-eboekhouden
resources:
  - namespace.yaml
  - configmap.yaml
  # secret.yaml is applied manually (contains real credentials)
  # Apply with: kubectl apply -f deploy/base/secret.yaml -n speedy-eboekhouden
  - postgres.yaml
  - redis.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
