apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: buskervezel.nl
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.tls.domains.0.main: speedy-eboekhouden.nl
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: speedy-affinity
    traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.samesite: strict
  name: speedy-eboekhouden
spec:
  ingressClassName: traefik
  rules:
    - host: speedy-eboekhouden.nl
      http:
        paths:
          - backend:
              service:
                name: backend
                port:
                  number: 8080
            path: /api
            pathType: Prefix
          - backend:
              service:
                name: frontend
                port:
                  number: 80
            path: /app
            pathType: Prefix
          - backend:
              service:
                name: landing
                port:
                  number: 80
            path: /
            pathType: Prefix
