# Copy this file to secret.yaml, fill in real values, and apply manually:
#   kubectl apply -f secret.yaml -n speedy-eboekhouden
# DO NOT commit secret.yaml with real credentials to git.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_DSN: "postgres://speedy:CHANGEME@postgres:5432/speedy?sslmode=disable"
  POSTGRES_USER: "speedy"
  POSTGRES_PASSWORD: "CHANGEME"

  # Redis
  REDIS_URL: "redis://redis:6379"

  # Encryption (generate with: openssl rand -hex 32)
  ENCRYPTION_KEY: "CHANGEME_generate_with_openssl_rand_hex_32"

  # SMTP (optional — for passkey recovery emails)
  SMTP_HOST: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@speedy-eboekhouden.nl"

  # Cloudflare R2 (optional — for avatar + PDF storage)
  R2_ACCOUNT_ID: ""
  R2_ACCESS_KEY_ID: ""
  R2_SECRET_ACCESS_KEY: ""
  R2_BUCKET: ""
  R2_JURISDICTION: "eu"
  R2_PUBLIC_URL: ""
